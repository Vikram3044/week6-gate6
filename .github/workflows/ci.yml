name: MySQL Testcontainers CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testcontainers:
    name: MySQL container and Flyway migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation project
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate Gradle wrapper in CI
        run: gradle wrapper --gradle-version 8.10.2 --no-daemon

      - name: Run isolated MySQL Testcontainers check
        run: ./gradlew clean test --tests com.shopkart.data.db.MySqlContainerSmokeTest --no-daemon

      - name: Scan committed files for local secret files
        run: |
          ! git ls-files | grep -E '(^|/)(\.env($|\.)|secrets\.local\.properties$)' | grep -v -E '(^|/)\.env\.example$'
